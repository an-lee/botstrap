schema_version: 1
groups:
  - name: Editor
    id: editor
    select: single
    items:
      - name: cursor
        description: "AI-first code editor"
        install:
          darwin: brew install --cask cursor
          linux: curl -fsSL https://cursor.sh/install | bash
          windows: winget install --id Anysphere.Cursor -e --accept-package-agreements --accept-source-agreements
        update:
          darwin: brew upgrade --cask cursor
          linux: curl -fsSL https://cursor.sh/install | bash
          windows: winget upgrade --id Anysphere.Cursor -e --accept-package-agreements --accept-source-agreements
        verify: bash -c "command -v cursor >/dev/null || command -v cursor-agent >/dev/null"
        verify_windows: 'if (-not (Get-Command cursor -ErrorAction SilentlyContinue) -and -not (Get-Command cursor-agent -ErrorAction SilentlyContinue)) { throw "cursor not found" }'
      - name: vscode
        description: "Visual Studio Code"
        install:
          darwin: brew install --cask visual-studio-code
          linux-apt: sudo apt-get install -y code || sudo snap install code --classic
          linux-dnf: sudo rpm --import https://packages.microsoft.com/keys/microsoft.asc && sudo sh -c 'echo -e "[code]\nname=Visual Studio Code\nbaseurl=https://packages.microsoft.com/yumrepos/vscode\nenabled=1\ngpgcheck=1\ngpgkey=https://packages.microsoft.com/keys/microsoft.asc" > /etc/yum.repos.d/vscode.repo' && sudo dnf install -y code
          linux-pacman: sudo pacman -Sy --needed --noconfirm code
          windows: winget install --id Microsoft.VisualStudioCode -e --accept-package-agreements --accept-source-agreements
        update:
          darwin: brew upgrade --cask visual-studio-code
          linux-apt: sudo apt-get update && sudo apt-get install --only-upgrade -y code
          linux-dnf: sudo dnf upgrade -y code
          linux-pacman: sudo pacman -Sy --needed --noconfirm code
          windows: winget upgrade --id Microsoft.VisualStudioCode -e --accept-package-agreements --accept-source-agreements
        verify: code --version
      - name: neovim
        description: "Neovim editor"
        install:
          darwin: brew install neovim
          linux-apt: sudo apt-get install -y neovim
          linux-dnf: sudo dnf install -y neovim
          linux-pacman: sudo pacman -Sy --needed --noconfirm neovim
          windows: winget install --id Neovim.Neovim -e --accept-package-agreements --accept-source-agreements
        update:
          darwin: brew upgrade neovim
          linux-apt: sudo apt-get update && sudo apt-get install --only-upgrade -y neovim
          linux-dnf: sudo dnf upgrade -y neovim
          linux-pacman: sudo pacman -Sy --needed --noconfirm neovim
          windows: winget upgrade --id Neovim.Neovim -e --accept-package-agreements --accept-source-agreements
        verify: nvim --version
      - name: zed
        description: "Zed code editor"
        install:
          darwin: brew install --cask zed
          linux: curl -fsSL https://zed.dev/install.sh | sh
          windows: winget install --id ZedIndustries.Zed -e --accept-package-agreements --accept-source-agreements
        update:
          darwin: brew upgrade --cask zed
          linux: curl -fsSL https://zed.dev/install.sh | sh
          windows: winget upgrade --id ZedIndustries.Zed -e --accept-package-agreements --accept-source-agreements
        verify: bash -c "command -v zed >/dev/null && zed --version"
        verify_windows: 'if (-not (Get-Command zed -ErrorAction SilentlyContinue)) { throw "zed not found" }; & zed --version'

  - name: Programming Languages
    id: languages
    select: multiple
    items:
      - name: node
        description: "Node.js via mise (LTS)"
        requires: [mise]
        install:
          all: bash -c 'export PATH="$HOME/.local/bin:$PATH"; mise use --global node@lts'
          windows: '$env:PATH = "$env:LOCALAPPDATA\mise\bin;$env:USERPROFILE\.local\bin;$env:PATH"; mise use --global node@lts'
        update:
          all: bash -c 'export PATH="$HOME/.local/bin:$PATH"; mise upgrade node; mise use --global node@lts'
          windows: '$env:PATH = "$env:LOCALAPPDATA\mise\bin;$env:USERPROFILE\.local\bin;$env:PATH"; mise upgrade node; mise use --global node@lts'
        verify: bash -c 'export PATH="$HOME/.local/bin:$PATH"; node --version'
        verify_windows: '$env:PATH = "$env:LOCALAPPDATA\mise\bin;$env:USERPROFILE\.local\bin;$env:PATH"; node --version'
      - name: python
        description: "Python via mise (latest stable)"
        requires: [mise]
        install:
          all: bash -c 'export PATH="$HOME/.local/bin:$PATH"; mise use --global python@latest'
          windows: '$env:PATH = "$env:LOCALAPPDATA\mise\bin;$env:USERPROFILE\.local\bin;$env:PATH"; mise use --global python@latest'
        update:
          all: bash -c 'export PATH="$HOME/.local/bin:$PATH"; mise upgrade python; mise use --global python@latest'
          windows: '$env:PATH = "$env:LOCALAPPDATA\mise\bin;$env:USERPROFILE\.local\bin;$env:PATH"; mise upgrade python; mise use --global python@latest'
        verify: bash -c 'export PATH="$HOME/.local/bin:$PATH"; python3 --version'
        verify_windows: '$env:PATH = "$env:LOCALAPPDATA\mise\bin;$env:USERPROFILE\.local\bin;$env:PATH"; python --version'
      - name: ruby
        description: "Ruby via mise"
        requires: [mise]
        install:
          all: bash -c 'export PATH="$HOME/.local/bin:$PATH"; mise use --global ruby@latest'
          windows: '$env:PATH = "$env:LOCALAPPDATA\mise\bin;$env:USERPROFILE\.local\bin;$env:PATH"; mise use --global ruby@latest'
        update:
          all: bash -c 'export PATH="$HOME/.local/bin:$PATH"; mise upgrade ruby; mise use --global ruby@latest'
          windows: '$env:PATH = "$env:LOCALAPPDATA\mise\bin;$env:USERPROFILE\.local\bin;$env:PATH"; mise upgrade ruby; mise use --global ruby@latest'
        verify: bash -c 'export PATH="$HOME/.local/bin:$PATH"; ruby --version'
        verify_windows: '$env:PATH = "$env:LOCALAPPDATA\mise\bin;$env:USERPROFILE\.local\bin;$env:PATH"; ruby --version'
      - name: go
        description: "Go via mise"
        requires: [mise]
        install:
          all: bash -c 'export PATH="$HOME/.local/bin:$PATH"; mise use --global go@latest'
          windows: '$env:PATH = "$env:LOCALAPPDATA\mise\bin;$env:USERPROFILE\.local\bin;$env:PATH"; mise use --global go@latest'
        update:
          all: bash -c 'export PATH="$HOME/.local/bin:$PATH"; mise upgrade go; mise use --global go@latest'
          windows: '$env:PATH = "$env:LOCALAPPDATA\mise\bin;$env:USERPROFILE\.local\bin;$env:PATH"; mise upgrade go; mise use --global go@latest'
        verify: bash -c 'export PATH="$HOME/.local/bin:$PATH"; go version'
        verify_windows: '$env:PATH = "$env:LOCALAPPDATA\mise\bin;$env:USERPROFILE\.local\bin;$env:PATH"; go version'
      - name: rust
        description: "Rust via mise (rust stable)"
        requires: [mise]
        install:
          all: bash -c 'export PATH="$HOME/.local/bin:$PATH"; mise use --global rust@stable'
          windows: '$env:PATH = "$env:LOCALAPPDATA\mise\bin;$env:USERPROFILE\.local\bin;$env:PATH"; mise use --global rust@stable'
        update:
          all: bash -c 'export PATH="$HOME/.local/bin:$PATH"; mise upgrade rust; mise use --global rust@stable'
          windows: '$env:PATH = "$env:LOCALAPPDATA\mise\bin;$env:USERPROFILE\.local\bin;$env:PATH"; mise upgrade rust; mise use --global rust@stable'
        verify: bash -c 'export PATH="$HOME/.local/bin:$PATH"; rustc --version'
        verify_windows: '$env:PATH = "$env:LOCALAPPDATA\mise\bin;$env:USERPROFILE\.local\bin;$env:PATH"; rustc --version'
      - name: java
        description: "Java via mise (Temurin LTS)"
        requires: [mise]
        install:
          all: bash -c 'export PATH="$HOME/.local/bin:$PATH"; mise use --global java@temurin-21'
          windows: '$env:PATH = "$env:LOCALAPPDATA\mise\bin;$env:USERPROFILE\.local\bin;$env:PATH"; mise use --global java@temurin-21'
        update:
          all: bash -c 'export PATH="$HOME/.local/bin:$PATH"; mise upgrade java; mise use --global java@temurin-21'
          windows: '$env:PATH = "$env:LOCALAPPDATA\mise\bin;$env:USERPROFILE\.local\bin;$env:PATH"; mise upgrade java; mise use --global java@temurin-21'
        verify: bash -c 'export PATH="$HOME/.local/bin:$PATH"; java --version'
        verify_windows: '$env:PATH = "$env:LOCALAPPDATA\mise\bin;$env:USERPROFILE\.local\bin;$env:PATH"; java --version'
      - name: elixir
        description: "Elixir via mise"
        requires: [mise]
        install:
          all: bash -c 'export PATH="$HOME/.local/bin:$PATH"; mise use --global elixir@latest'
          windows: '$env:PATH = "$env:LOCALAPPDATA\mise\bin;$env:USERPROFILE\.local\bin;$env:PATH"; mise use --global elixir@latest'
        update:
          all: bash -c 'export PATH="$HOME/.local/bin:$PATH"; mise upgrade elixir; mise use --global elixir@latest'
          windows: '$env:PATH = "$env:LOCALAPPDATA\mise\bin;$env:USERPROFILE\.local\bin;$env:PATH"; mise upgrade elixir; mise use --global elixir@latest'
        verify: bash -c 'export PATH="$HOME/.local/bin:$PATH"; elixir --version'
        verify_windows: '$env:PATH = "$env:LOCALAPPDATA\mise\bin;$env:USERPROFILE\.local\bin;$env:PATH"; elixir --version'
      - name: php
        description: "PHP via mise"
        requires: [mise]
        install:
          all: bash -c 'export PATH="$HOME/.local/bin:$PATH"; mise use --global php@latest'
          windows: '$env:PATH = "$env:LOCALAPPDATA\mise\bin;$env:USERPROFILE\.local\bin;$env:PATH"; mise use --global php@latest'
        update:
          all: bash -c 'export PATH="$HOME/.local/bin:$PATH"; mise upgrade php; mise use --global php@latest'
          windows: '$env:PATH = "$env:LOCALAPPDATA\mise\bin;$env:USERPROFILE\.local\bin;$env:PATH"; mise upgrade php; mise use --global php@latest'
        verify: bash -c 'export PATH="$HOME/.local/bin:$PATH"; php --version'
        verify_windows: '$env:PATH = "$env:LOCALAPPDATA\mise\bin;$env:USERPROFILE\.local\bin;$env:PATH"; php --version'

  - name: Databases
    id: databases
    select: multiple
    items:
      - name: postgresql
        description: "PostgreSQL in Docker (official image)"
        requires: [docker]
        install:
          all: docker pull postgres:16-alpine
        update:
          all: docker pull postgres:16-alpine
        verify: docker image inspect postgres:16-alpine >/dev/null
        verify_windows: 'docker image inspect postgres:16-alpine 2>&1 | Out-Null; if (-not $?) { throw "image not found" }'
      - name: mysql
        description: "MySQL in Docker"
        requires: [docker]
        install:
          all: docker pull mysql:8
        update:
          all: docker pull mysql:8
        verify: docker image inspect mysql:8 >/dev/null
        verify_windows: 'docker image inspect mysql:8 2>&1 | Out-Null; if (-not $?) { throw "image not found" }'
      - name: redis
        description: "Redis in Docker"
        requires: [docker]
        install:
          all: docker pull redis:7-alpine
        update:
          all: docker pull redis:7-alpine
        verify: docker image inspect redis:7-alpine >/dev/null
        verify_windows: 'docker image inspect redis:7-alpine 2>&1 | Out-Null; if (-not $?) { throw "image not found" }'
      - name: sqlite
        description: "SQLite is file-based; ensure sqlite3 CLI"
        install:
          darwin: brew install sqlite
          linux-apt: sudo apt-get install -y sqlite3
          linux-dnf: sudo dnf install -y sqlite
          linux-pacman: sudo pacman -Sy --needed --noconfirm sqlite
          windows: winget install --id SQLite.SQLite -e --accept-package-agreements --accept-source-agreements
        update:
          darwin: brew upgrade sqlite
          linux-apt: sudo apt-get update && sudo apt-get install --only-upgrade -y sqlite3
          linux-dnf: sudo dnf upgrade -y sqlite
          linux-pacman: sudo pacman -Sy --needed --noconfirm sqlite
          windows: winget upgrade --id SQLite.SQLite -e --accept-package-agreements --accept-source-agreements
        verify: sqlite3 --version

  - name: AI Agent Tools
    id: ai_tools
    select: multiple
    items:
      - name: claude-code
        description: "Anthropic Claude coding agent CLI"
        requires: [node]
        install:
          all: bash -c 'export PATH="$HOME/.local/bin:$PATH"; npm install -g @anthropic-ai/claude-code'
          windows: '$env:PATH = "$env:LOCALAPPDATA\mise\bin;$env:USERPROFILE\.local\bin;$env:PATH"; npm install -g @anthropic-ai/claude-code'
        update:
          all: bash -c 'export PATH="$HOME/.local/bin:$PATH"; npm install -g @anthropic-ai/claude-code@latest'
          windows: '$env:PATH = "$env:LOCALAPPDATA\mise\bin;$env:USERPROFILE\.local\bin;$env:PATH"; npm install -g @anthropic-ai/claude-code@latest'
        verify: bash -c 'export PATH="$HOME/.local/bin:$PATH"; claude --version'
        verify_windows: '$env:PATH = "$env:LOCALAPPDATA\mise\bin;$env:USERPROFILE\.local\bin;$env:PATH"; claude --version'
      - name: openclaw
        description: "Open source AI coding assistant CLI"
        requires: [node]
        install:
          all: bash -c 'export PATH="$HOME/.local/bin:$PATH"; npm install -g openclaw'
          windows: '$env:PATH = "$env:LOCALAPPDATA\mise\bin;$env:USERPROFILE\.local\bin;$env:PATH"; npm install -g openclaw'
        update:
          all: bash -c 'export PATH="$HOME/.local/bin:$PATH"; npm install -g openclaw@latest'
          windows: '$env:PATH = "$env:LOCALAPPDATA\mise\bin;$env:USERPROFILE\.local\bin;$env:PATH"; npm install -g openclaw@latest'
        verify: bash -c 'export PATH="$HOME/.local/bin:$PATH"; command -v openclaw >/dev/null'
        verify_windows: 'if (-not (Get-Command openclaw -ErrorAction SilentlyContinue)) { throw "openclaw not found" }'
      - name: codex
        description: "OpenAI Codex CLI agent"
        requires: [node]
        install:
          all: bash -c 'export PATH="$HOME/.local/bin:$PATH"; npm install -g @openai/codex'
          windows: '$env:PATH = "$env:LOCALAPPDATA\mise\bin;$env:USERPROFILE\.local\bin;$env:PATH"; npm install -g @openai/codex'
        update:
          all: bash -c 'export PATH="$HOME/.local/bin:$PATH"; npm install -g @openai/codex@latest'
          windows: '$env:PATH = "$env:LOCALAPPDATA\mise\bin;$env:USERPROFILE\.local\bin;$env:PATH"; npm install -g @openai/codex@latest'
        verify: bash -c 'export PATH="$HOME/.local/bin:$PATH"; codex --version'
        verify_windows: '$env:PATH = "$env:LOCALAPPDATA\mise\bin;$env:USERPROFILE\.local\bin;$env:PATH"; codex --version'
      - name: gemini
        description: "Google Gemini CLI (install per current Google distribution)"
        requires: [node]
        install:
          all: echo "Install the Gemini CLI using the official Google instructions for your OS."
          windows: 'Write-Host "Install the Gemini CLI using the official Google instructions for your OS."'
        update:
          all: echo "Update the Gemini CLI using the official Google instructions for your OS."
          windows: 'Write-Host "Update the Gemini CLI using the official Google instructions for your OS."'
        verify: bash -c "command -v gemini >/dev/null"
        verify_windows: 'if (-not (Get-Command gemini -ErrorAction SilentlyContinue)) { throw "gemini not found" }'
      - name: ollama
        description: "Run local LLMs"
        install:
          darwin: brew install ollama
          linux: curl -fsSL https://ollama.com/install.sh | sh
          windows: winget install --id Ollama.Ollama -e --accept-package-agreements --accept-source-agreements
        update:
          darwin: brew upgrade ollama
          linux: curl -fsSL https://ollama.com/install.sh | sh
          windows: winget upgrade --id Ollama.Ollama -e --accept-package-agreements --accept-source-agreements
        verify: ollama --version

  - name: Theme
    id: theme
    select: single
    items:
      - name: catppuccin
        description: "Catppuccin palette for terminal and editors"
        install:
          all: echo "Theme catppuccin — Phase 3 copies themes/catppuccin (Starship + optional editor.json merge)."
          windows: 'Write-Host "Theme catppuccin — Phase 3 copies themes/catppuccin (Starship + optional editor.json merge)."'
        update:
          all: echo "Theme catppuccin — re-run botstrap reconfigure to refresh theme bundles from the repo."
          windows: 'Write-Host "Theme catppuccin — re-run botstrap reconfigure to refresh theme bundles from the repo."'
        verify: bash -c "exit 0"
        verify_windows: '$true'
      - name: tokyo-night
        description: "Tokyo Night"
        install:
          all: echo "Theme tokyo-night — Phase 3 copies themes/tokyo-night (Starship + optional editor.json merge)."
