# Botstrap — Gruvbox dark (starship.rs palette)
format = "$all"
palette = "gruvbox_dark"

[palettes.gruvbox_dark]
accent = "#83a598"
dim = "#928374"
green = "#b8bb26"
red = "#fb4934"

[character]
success_symbol = "[➜](bold fg:green) "
error_symbol = "[➜](bold fg:red) "

[directory]
truncation_length = 3
style = "fg:accent"
